<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Guinevere 3D Control</title>
  <style>
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#08111f; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; touch-action:none; }
    canvas { display:block; }
    #ui { position:fixed; inset:0; pointer-events:none; color:#fff; }
    #hud {
      position:absolute; left:12px; top:12px; max-width:min(92vw, 460px);
      background:rgba(0,0,0,.36); backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.12); border-radius:16px; padding:12px 14px; pointer-events:auto;
      box-shadow:0 12px 32px rgba(0,0,0,.28);
    }
    #title { font-weight:800; font-size:16px; margin-bottom:4px; }
    #status { margin-top:8px; font-weight:650; }
    #hint { margin-top:6px; font-size:12px; opacity:.82; line-height:1.35; }
    #loaderRow { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; align-items:center; }
    #file { max-width:100%; color:#fff; font-size:12px; }
    .chip {
      display:inline-flex; align-items:center; justify-content:center; padding:8px 12px; border:0; border-radius:999px;
      background:rgba(255,255,255,.12); color:#fff; font-weight:700; pointer-events:auto; touch-action:none;
    }
    .chip:active, .chip.active { background:rgba(255,255,255,.26); transform:translateY(1px) scale(.98); }
    #leftPad, #rightPad { position:absolute; bottom:18px; pointer-events:auto; }
    #leftPad { left:18px; display:grid; grid-template-columns:64px 64px 64px; grid-template-rows:64px 64px 64px; gap:8px; }
    #rightPad { right:18px; display:flex; flex-direction:column; gap:10px; align-items:flex-end; }
    .btn {
      width:64px; height:64px; border:0; border-radius:18px; background:rgba(255,255,255,.12); color:#fff; font-size:20px; font-weight:800;
      box-shadow:0 8px 24px rgba(0,0,0,.28); backdrop-filter:blur(8px); touch-action:none;
    }
    .btn:active, .btn.active { background:rgba(255,255,255,.26); transform:translateY(1px) scale(.98); }
    #forward { grid-column:2; grid-row:1; }
    #left { grid-column:1; grid-row:2; }
    #back { grid-column:2; grid-row:2; }
    #right { grid-column:3; grid-row:2; }
    #action { width:92px; height:92px; border-radius:28px; background:linear-gradient(135deg, rgba(255,145,0,.8), rgba(255,60,60,.82)); }
    #jump { width:80px; height:80px; border-radius:24px; background:rgba(120,190,255,.22); }
    .small { font-size:12px; opacity:.78; }
  </style>
</head>
<body>
  <div id="ui">
    <div id="hud">
      <div id="title">Guinevere 3D Control</div>
      <div class="small">WASD / flechas para mover. Espacio o botón naranja para acción. El botón de salto usa la animación de acción como efecto.</div>
      <div id="loaderRow">
        <input id="file" type="file" accept=".glb,.gltf,.bin,.png,.jpg,.jpeg" />
        <button class="chip" id="recenter">Recentrar</button>
      </div>
      <div id="status">Cargando… selecciona el .glb si no aparece automáticamente.</div>
      <div id="hint">Animaciones detectadas: <strong id="animList">ninguna aún</strong></div>
    </div>

    <div id="leftPad">
      <button class="btn" id="forward">▲</button>
      <button class="btn" id="left">◀</button>
      <button class="btn" id="back">▼</button>
      <button class="btn" id="right">▶</button>
    </div>

    <div id="rightPad">
      <button class="btn" id="action">ACC</button>
      <button class="btn" id="jump">SALTO</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.161.0/examples/jsm/loaders/GLTFLoader.js';

    const statusEl = document.getElementById('status');
    const animListEl = document.getElementById('animList');
    const fileEl = document.getElementById('file');
    const recenterBtn = document.getElementById('recenter');

    const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x08111f);
    scene.fog = new THREE.Fog(0x08111f, 14, 42);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 2.4, 5.8);

    scene.add(new THREE.HemisphereLight(0xcde5ff, 0x223344, 1.7));
    const sun = new THREE.DirectionalLight(0xffffff, 2.2);
    sun.position.set(6, 10, 6);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -20;
    sun.shadow.camera.right = 20;
    sun.shadow.camera.top = 20;
    sun.shadow.camera.bottom = -20;
    sun.shadow.camera.near = 0.5;
    sun.shadow.camera.far = 40;
    scene.add(sun);
    const fill = new THREE.DirectionalLight(0x76a7ff, 0.5);
    fill.position.set(-5, 4, -6);
    scene.add(fill);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(140, 140),
      new THREE.MeshStandardMaterial({ color:0x162131, roughness:1, metalness:0 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(140, 140, 0x335577, 0x203244);
    grid.position.y = 0.001;
    scene.add(grid);

    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(6, 0.08, 16, 120),
      new THREE.MeshStandardMaterial({ color:0x4f6b8f, emissive:0x112233, roughness:0.35 })
    );
    ring.rotation.x = Math.PI / 2;
    ring.position.y = 0.05;
    scene.add(ring);

    const props = new THREE.Group();
    const propMat = new THREE.MeshStandardMaterial({ color:0x2a3c56, roughness:0.9 });
    for (let i = 0; i < 10; i++) {
      const c = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.18, 1.2 + Math.random() * 2.2, 10), propMat);
      const a = (i / 10) * Math.PI * 2;
      const r = 9 + Math.random() * 8;
      c.position.set(Math.cos(a) * r, c.geometry.parameters.height / 2, Math.sin(a) * r);
      c.castShadow = true; c.receiveShadow = true;
      props.add(c);
    }
    scene.add(props);

    const clock = new THREE.Clock();
    const tmpBox = new THREE.Box3();
    const tmpSize = new THREE.Vector3();
    const tmpCenter = new THREE.Vector3();
    const tmpVec = new THREE.Vector3();
    const tmpVec2 = new THREE.Vector3();

    const state = {
      model: null,
      mixer: null,
      actions: {},
      current: null,
      loaded: false,
      isJumping: false,
      jumpT: 0,
      baseY: 0,
      camTarget: new THREE.Vector3(0, 1.2, 0),
      modelScale: 1,
      modelHeight: 2,
      yaw: 0,
      velocityY: 0,
      grounded: true,
      autoRotate: false,
    };

    const pressed = { forward:false, back:false, left:false, right:false, action:false, jump:false };
    const keyMap = {
      KeyW:'forward', ArrowUp:'forward',
      KeyS:'back', ArrowDown:'back',
      KeyA:'left', ArrowLeft:'left',
      KeyD:'right', ArrowRight:'right',
      Space:'action', ShiftLeft:'jump', ShiftRight:'jump'
    };

    function setStatus(msg) { statusEl.textContent = msg; }
    function setActive(id, on) { const el = document.getElementById(id); if (el) el.classList.toggle('active', !!on); }

    function setPressed(name, value) {
      pressed[name] = value;
      setActive(name === 'forward' ? 'forward' : name === 'back' ? 'back' : name === 'left' ? 'left' : name === 'right' ? 'right' : name === 'action' ? 'action' : 'jump', value);
    }

    function bindButton(id, name) {
      const el = document.getElementById(id);
      const down = (e) => { e.preventDefault(); setPressed(name, true); };
      const up = (e) => { e.preventDefault(); setPressed(name, false); };
      el.addEventListener('pointerdown', down);
      el.addEventListener('pointerup', up);
      el.addEventListener('pointercancel', up);
      el.addEventListener('pointerleave', up);
    }
    bindButton('forward', 'forward');
    bindButton('back', 'back');
    bindButton('left', 'left');
    bindButton('right', 'right');
    bindButton('action', 'action');
    bindButton('jump', 'jump');

    window.addEventListener('keydown', (e) => {
      const action = keyMap[e.code];
      if (!action) return;
      e.preventDefault();
      setPressed(action, true);
    });
    window.addEventListener('keyup', (e) => {
      const action = keyMap[e.code];
      if (!action) return;
      e.preventDefault();
      setPressed(action, false);
    });
    window.addEventListener('blur', () => { Object.keys(pressed).forEach(k => setPressed(k, false)); });

    function playClip(name, fade = 0.15) {
      const next = state.actions[name];
      if (!next) return;
      if (state.current === next) return;
      if (state.current) state.current.fadeOut(fade);
      next.reset().fadeIn(fade).play();
      state.current = next;
    }

    function updateAnim(moving, jumping) {
      const wantAction = pressed.action || pressed.jump || jumping;
      if (!state.actions.idle && !state.actions.action) return;
      if (wantAction) {
        playClip('action', 0.08);
        if (state.actions.action) state.actions.action.timeScale = moving ? 1.25 : 1.0;
        return;
      }
      if (moving) {
        playClip('action', 0.12);
        if (state.actions.action) state.actions.action.timeScale = 1.15;
      } else {
        playClip('idle', 0.18);
        if (state.actions.idle) state.actions.idle.timeScale = 1.0;
      }
    }

    function centerAndScaleModel(model) {
      tmpBox.setFromObject(model);
      tmpBox.getSize(tmpSize);
      tmpBox.getCenter(tmpCenter);

      const maxDim = Math.max(tmpSize.x, tmpSize.y, tmpSize.z) || 1;
      const targetSize = 2.6;
      const scale = targetSize / maxDim;
      model.scale.setScalar(scale);

      tmpBox.setFromObject(model);
      tmpBox.getSize(tmpSize);
      tmpBox.getCenter(tmpCenter);
      model.position.x -= tmpCenter.x;
      model.position.z -= tmpCenter.z;
      model.position.y -= tmpBox.min.y;

      state.modelHeight = tmpSize.y * scale;
      state.baseY = 0;
      camera.position.set(0, Math.max(2.1, state.modelHeight * 1.15), Math.max(5.2, state.modelHeight * 2.1));
    }

    function prepareGltf(gltf) {
      if (state.model) scene.remove(state.model);
      state.model = gltf.scene || gltf.scenes?.[0];
      if (!state.model) throw new Error('No se encontró la escena del modelo.');
      scene.add(state.model);

      state.model.traverse((obj) => {
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
          if (obj.material) {
            obj.material.metalness = obj.material.metalness ?? 0;
            obj.material.roughness = obj.material.roughness ?? 1;
          }
        }
      });

      centerAndScaleModel(state.model);

      state.actions = {};
      state.current = null;
      if (gltf.animations && gltf.animations.length) {
        state.mixer = new THREE.AnimationMixer(state.model);
        const names = [];
        for (const clip of gltf.animations) {
          const name = (clip.name || '').toLowerCase();
          const action = state.mixer.clipAction(clip);
          action.loop = THREE.LoopRepeat;
          action.clampWhenFinished = false;
          action.enabled = true;
          if (name.includes('idle') && !state.actions.idle) state.actions.idle = action;
          else if ((name.includes('action') || name.includes('attack') || name.includes('skill')) && !state.actions.action) state.actions.action = action;
          names.push(clip.name || 'sin nombre');
        }
        if (!state.actions.idle && gltf.animations[0]) state.actions.idle = state.mixer.clipAction(gltf.animations[0]);
        if (!state.actions.action && gltf.animations[1]) state.actions.action = state.mixer.clipAction(gltf.animations[1]);
        if (state.actions.idle) state.actions.idle.reset().play();
        state.current = state.actions.idle || state.actions.action || null;
        animListEl.textContent = names.join(', ');
        setStatus(`Modelo cargado. Animaciones detectadas: ${names.join(', ')}`);
      } else {
        animListEl.textContent = 'ninguna';
        setStatus('Modelo cargado, pero no trae animaciones dentro del .glb.');
      }

      state.loaded = true;
    }

    async function loadFromFile(file) {
      if (!file) return;
      const buffer = await file.arrayBuffer();
      const loader = new GLTFLoader();
      loader.parse(buffer, '', (gltf) => {
        try {
          prepareGltf(gltf);
        } catch (err) {
          console.error(err);
          setStatus('Se cargó el archivo, pero falló la preparación del modelo. Revisa la consola.');
        }
      }, (err) => {
        console.error(err);
        setStatus('Error leyendo el archivo. Asegúrate de seleccionar el .glb correcto.');
      });
    }

    fileEl.addEventListener('change', () => loadFromFile(fileEl.files?.[0]));

    recenterBtn.addEventListener('click', () => {
      if (!state.model) return;
      centerAndScaleModel(state.model);
      setStatus('Modelo recentrado.');
    });

    window.addEventListener('dragover', (e) => e.preventDefault());
    window.addEventListener('drop', (e) => {
      e.preventDefault();
      const file = e.dataTransfer?.files?.[0];
      if (file) loadFromFile(file);
    });

    function updateCamera(dt) {
      if (!state.model) return;
      const target = state.model.position.clone();
      target.y += Math.max(1.2, state.modelHeight * 0.52);
      state.camTarget.lerp(target, 0.06);

      const desired = new THREE.Vector3(
        state.camTarget.x,
        state.camTarget.y + Math.max(1.2, state.modelHeight * 0.45),
        state.camTarget.z + Math.max(4.8, state.modelHeight * 1.95)
      );
      camera.position.lerp(desired, 0.05);
      camera.lookAt(state.camTarget);
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.033);

      if (state.model) {
        const moveZ = (pressed.forward ? 1 : 0) - (pressed.back ? 1 : 0);
        const moveX = (pressed.right ? 1 : 0) - (pressed.left ? 1 : 0);
        const moving = moveZ !== 0 || moveX !== 0;

        if (moving) {
          const len = Math.hypot(moveX, moveZ) || 1;
          const nx = moveX / len;
          const nz = moveZ / len;
          const speed = 2.35;
          const dx = nx * speed * dt;
          const dz = nz * speed * dt;

          state.model.position.x += dx;
          state.model.position.z -= dz;

          const yawTarget = Math.atan2(nx, nz);
          state.yaw = THREE.MathUtils.lerpAngle(state.yaw, yawTarget, 0.16);
          state.model.rotation.y = state.yaw;
        }

        if (pressed.jump && state.grounded) {
          state.velocityY = 4.9;
          state.grounded = false;
          state.isJumping = true;
        }

        if (!state.grounded) {
          state.velocityY -= 12.5 * dt;
          state.model.position.y += state.velocityY * dt;
          if (state.model.position.y <= state.baseY) {
            state.model.position.y = state.baseY;
            state.velocityY = 0;
            state.grounded = true;
            state.isJumping = false;
          }
        }

        if (state.mixer) state.mixer.update(dt);
        updateAnim(moving, state.isJumping);
        updateCamera(dt);
      }

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    });

    setStatus('Carga tu .glb con el botón de archivo o arrástralo aquí.');
    animate();
  </script>
</body>
</html>
